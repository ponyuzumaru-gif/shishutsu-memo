<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#2f6f63">
    <meta name="description" content="スマホで素早く支出を記録して月ごとに見返せるPWA家計管理ツール">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="icon.svg">
    <link rel="stylesheet" href="styles.css">
    <title>支出メモ</title>
  </head>
  <body>
    <div class="app-shell">
      <header class="app-header">
        <div>
          <p class="eyebrow">支出メモ</p>
          <h1 id="screen-title">入力</h1>
        </div>
        <button class="ghost-icon" id="export-csv" type="button" aria-label="CSV出力" title="CSV出力">
          <span aria-hidden="true">CSV</span>
        </button>
      </header>

      <main class="content">
        <section class="screen active" id="screen-input" aria-labelledby="input-title">
          <h2 class="sr-only" id="input-title">支出登録</h2>
          <form id="expense-form" class="input-form">
            <label class="field">
              <span>金額</span>
              <div class="amount-row">
                <input id="amount" inputmode="numeric" pattern="[0-9]*" autocomplete="off" placeholder="0" required>
                <b>円</b>
              </div>
            </label>

            <label class="field compact-date">
              <span>日付</span>
              <input id="date" type="date" required>
            </label>

            <div class="field">
              <span>カテゴリ</span>
              <div class="chip-grid" id="category-options"></div>
            </div>

            <label class="field">
              <span>メモ</span>
              <input id="memo" type="text" maxlength="60" placeholder="店名・用途など">
            </label>

            <details class="tag-details">
              <summary>タグをつける</summary>
              <div class="chip-grid tags" id="tag-options"></div>
            </details>

            <p class="form-error" id="form-error" role="alert"></p>
            <p class="form-success" id="form-success" role="status"></p>

            <button class="primary-action" type="submit">登録する</button>
          </form>
        </section>

        <section class="screen" id="screen-month" aria-labelledby="month-title">
          <div class="month-toolbar">
            <button class="icon-button" id="prev-month" type="button" aria-label="前月">‹</button>
            <h2 id="month-title"></h2>
            <button class="icon-button" id="next-month" type="button" aria-label="翌月">›</button>
          </div>

          <div class="summary-grid">
            <article class="summary-card total">
              <span>支出合計</span>
              <strong id="month-total">0円</strong>
            </article>
            <article class="summary-card">
              <span>月予算</span>
              <strong id="month-budget">0円</strong>
            </article>
            <article class="summary-card">
              <span>残り</span>
              <strong id="month-remaining">0円</strong>
            </article>
            <article class="summary-card">
              <span>1日あたり</span>
              <strong id="daily-remaining">-</strong>
            </article>
          </div>

          <section class="panel">
            <div class="section-heading">
              <h3>カテゴリ別</h3>
            </div>
            <div id="category-summary" class="stack-list"></div>
          </section>

          <section class="panel">
            <div class="section-heading">
              <h3>ふり返り</h3>
            </div>
            <div id="reflection-list" class="reflection-list"></div>
          </section>
        </section>

        <section class="screen" id="screen-history" aria-labelledby="history-title">
          <h2 class="sr-only" id="history-title">履歴</h2>
          <div class="filters">
            <input id="filter-month" type="month" aria-label="月で絞り込み">
            <select id="filter-category" aria-label="カテゴリで絞り込み"></select>
            <select id="filter-tag" aria-label="タグで絞り込み"></select>
          </div>
          <div id="history-list" class="expense-list"></div>
        </section>

        <section class="screen" id="screen-settings" aria-labelledby="settings-title">
          <h2 id="settings-title">設定</h2>
          <form id="settings-form" class="settings-form">
            <label class="field">
              <span>月予算</span>
              <div class="amount-row">
                <input id="monthly-budget" inputmode="numeric" pattern="[0-9]*" placeholder="80000">
                <b>円</b>
              </div>
            </label>
            <label class="field">
              <span>初期カテゴリ</span>
              <select id="default-category"></select>
            </label>
            <button class="primary-action" type="submit">設定を保存</button>
            <p class="form-success" id="settings-success" role="status"></p>
          </form>
        </section>
      </main>

      <nav class="bottom-nav" aria-label="画面切り替え">
        <button class="nav-item active" data-screen="input" type="button">入力</button>
        <button class="nav-item" data-screen="month" type="button">今月</button>
        <button class="nav-item" data-screen="history" type="button">履歴</button>
        <button class="nav-item" data-screen="settings" type="button">設定</button>
      </nav>
    </div>

    <dialog id="edit-dialog">
      <form id="edit-form" class="edit-form" method="dialog">
        <div class="dialog-title">
          <h2>支出を編集</h2>
          <button class="icon-button" id="close-dialog" type="button" aria-label="閉じる">×</button>
        </div>
        <input id="edit-id" type="hidden">
        <label class="field">
          <span>金額</span>
          <div class="amount-row">
            <input id="edit-amount" inputmode="numeric" pattern="[0-9]*" required>
            <b>円</b>
          </div>
        </label>
        <label class="field">
          <span>日付</span>
          <input id="edit-date" type="date" required>
        </label>
        <label class="field">
          <span>カテゴリ</span>
          <select id="edit-category"></select>
        </label>
        <label class="field">
          <span>メモ</span>
          <input id="edit-memo" type="text" maxlength="60">
        </label>
        <div class="field">
          <span>タグ</span>
          <div class="chip-grid tags" id="edit-tags"></div>
        </div>
        <p class="form-error" id="edit-error" role="alert"></p>
        <div class="dialog-actions">
          <button class="subtle-danger" id="delete-expense" type="button">削除</button>
          <button class="secondary-action" id="cancel-edit" type="button">キャンセル</button>
          <button class="primary-action compact" type="submit">保存</button>
        </div>
      </form>
    </dialog>

    <script src="app.js" defer></script>
  </body>
</html>
